name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Check out Continuum plugin SDK
        uses: actions/checkout@v6
        with:
          repository: ContinuumApp/continuum-plugin-sdk
          path: continuum-plugin-sdk

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Point module resolution at checked out SDK repo
        run: go mod edit -replace=github.com/ContinuumApp/continuum-plugin-sdk=./continuum-plugin-sdk

      - name: Build plugin binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          binary="plugin-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags="-s -w" -o "dist/${binary}" .
          checksum=$(shasum -a 256 "dist/${binary}" | awk '{print $1}')
          printf '%s  %s\n' "$checksum" "$binary" > dist/checksums.txt
          sed "s/__CHECKSUM__/${checksum}/" manifest.json > "dist/manifest-${GOOS}-${GOARCH}.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/plugin-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/checksums.txt
            dist/manifest-${{ matrix.goos }}-${{ matrix.goarch }}.json

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          : > release/checksums.txt
          for dir in artifacts/plugin-*; do
            platform=$(basename "$dir" | sed 's/plugin-//')
            cp "${dir}/plugin-${platform}" "release/plugin-${platform}"
            cat "${dir}/checksums.txt" >> release/checksums.txt
          done
          sort -u -o release/checksums.txt release/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/plugin-linux-amd64
            release/plugin-linux-arm64
            release/plugin-darwin-arm64
            release/checksums.txt
          generate_release_notes: true
